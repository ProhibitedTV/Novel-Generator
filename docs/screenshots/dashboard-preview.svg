<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-label="Updated Novel Generator product preview">
  <defs>
    <linearGradient id="bg" x1="0%" x2="0%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f6f2eb"/>
      <stop offset="100%" stop-color="#eee3d2"/>
    </linearGradient>
    <radialGradient id="glow" cx="20%" cy="8%" r="55%">
      <stop offset="0%" stop-color="#cfe6dd" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#cfe6dd" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#182126" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect width="1440" height="900" fill="url(#bg)"/>
  <rect width="1440" height="900" fill="url(#glow)"/>

  <rect x="54" y="38" width="1332" height="824" rx="34" fill="#fff9f2" stroke="#d9cfc0" filter="url(#shadow)"/>

  <g>
    <text x="108" y="96" fill="#182126" font-family="Georgia, serif" font-size="34" font-weight="700">Novel Generator</text>
    <text x="108" y="126" fill="#5d676d" font-family="Georgia, serif" font-size="18">Self-hosted long-form fiction generation for Ollama.</text>
    <rect x="1184" y="72" width="130" height="42" rx="21" fill="none" stroke="#d9cfc0"/>
    <text x="1224" y="99" fill="#182126" font-family="Georgia, serif" font-size="18">Dashboard</text>
  </g>

  <g>
    <rect x="96" y="164" width="820" height="218" rx="28" fill="#fffaf3" stroke="#d9cfc0"/>
    <text x="132" y="208" fill="#176a5a" font-family="Georgia, serif" font-size="14" letter-spacing="3">CONTROL ROOM</text>
    <text x="132" y="264" fill="#182126" font-family="Georgia, serif" font-size="46" font-weight="700">Run local novel jobs without</text>
    <text x="132" y="316" fill="#182126" font-family="Georgia, serif" font-size="46" font-weight="700">babysitting the browser.</text>
    <text x="132" y="356" fill="#5d676d" font-family="Georgia, serif" font-size="22">Projects keep premise defaults. Runs queue in the background,</text>
    <text x="132" y="386" fill="#5d676d" font-family="Georgia, serif" font-size="22">stream progress, and save artifacts for chapter-level regeneration.</text>
  </g>

  <g>
    <rect x="944" y="164" width="400" height="218" rx="28" fill="#f8fcfa" stroke="#d9cfc0"/>
    <text x="980" y="214" fill="#182126" font-family="Georgia, serif" font-size="30" font-weight="700">Ollama</text>

    <text x="980" y="256" fill="#5d676d" font-family="Georgia, serif" font-size="16">Status</text>
    <text x="980" y="281" fill="#0c4f43" font-family="Georgia, serif" font-size="22" font-weight="700">Connected</text>

    <text x="980" y="326" fill="#5d676d" font-family="Georgia, serif" font-size="16">Base URL</text>
    <text x="980" y="351" fill="#182126" font-family="Georgia, serif" font-size="18">http://host.docker.internal:11434</text>

    <text x="980" y="396" fill="#5d676d" font-family="Georgia, serif" font-size="16">Default model</text>
    <text x="980" y="421" fill="#182126" font-family="Georgia, serif" font-size="18">llama3.1:8b-instruct-q4_K_M</text>
  </g>

  <g>
    <rect x="96" y="418" width="624" height="394" rx="28" fill="#fffaf3" stroke="#d9cfc0"/>
    <text x="132" y="466" fill="#182126" font-family="Georgia, serif" font-size="30" font-weight="700">Create a project</text>

    <rect x="132" y="496" width="552" height="54" rx="16" fill="#ffffff" stroke="#d9cfc0"/>
    <text x="156" y="529" fill="#8c8377" font-family="Georgia, serif" font-size="18">The Glass Orchard</text>

    <rect x="132" y="566" width="552" height="106" rx="16" fill="#ffffff" stroke="#d9cfc0"/>
    <text x="156" y="600" fill="#8c8377" font-family="Georgia, serif" font-size="18">A disgraced archivist uncovers a living map hidden</text>
    <text x="156" y="628" fill="#8c8377" font-family="Georgia, serif" font-size="18">beneath a dying city and must decide who gets</text>
    <text x="156" y="656" fill="#8c8377" font-family="Georgia, serif" font-size="18">to rewrite its memory.</text>

    <rect x="132" y="692" width="264" height="54" rx="16" fill="#ffffff" stroke="#d9cfc0"/>
    <rect x="420" y="692" width="264" height="54" rx="16" fill="#ffffff" stroke="#d9cfc0"/>
    <text x="156" y="725" fill="#8c8377" font-family="Georgia, serif" font-size="18">40000 total words</text>
    <text x="444" y="725" fill="#8c8377" font-family="Georgia, serif" font-size="18">12 chapters</text>

    <rect x="132" y="764" width="184" height="42" rx="21" fill="#176a5a"/>
    <text x="170" y="791" fill="#fff9f2" font-family="Georgia, serif" font-size="20" font-weight="700">Create project</text>
  </g>

  <g>
    <rect x="748" y="418" width="596" height="178" rx="28" fill="#fffaf3" stroke="#d9cfc0"/>
    <text x="784" y="466" fill="#182126" font-family="Georgia, serif" font-size="30" font-weight="700">Provider settings</text>

    <rect x="784" y="496" width="524" height="46" rx="14" fill="#ffffff" stroke="#d9cfc0"/>
    <text x="806" y="525" fill="#8c8377" font-family="Georgia, serif" font-size="17">http://host.docker.internal:11434</text>

    <rect x="784" y="556" width="338" height="46" rx="14" fill="#ffffff" stroke="#d9cfc0"/>
    <rect x="1140" y="556" width="168" height="46" rx="23" fill="none" stroke="#d9cfc0"/>
    <text x="806" y="585" fill="#8c8377" font-family="Georgia, serif" font-size="17">llama3.1:8b-instruct-q4_K_M</text>
    <text x="1177" y="585" fill="#182126" font-family="Georgia, serif" font-size="17">Save settings</text>
  </g>

  <g>
    <rect x="748" y="622" width="596" height="190" rx="28" fill="#fffaf3" stroke="#d9cfc0"/>
    <text x="784" y="670" fill="#182126" font-family="Georgia, serif" font-size="30" font-weight="700">Projects</text>

    <rect x="784" y="694" width="524" height="48" rx="24" fill="#ffffff" stroke="#d9cfc0"/>
    <text x="808" y="722" fill="#182126" font-family="Georgia, serif" font-size="18" font-weight="700">The Glass Orchard</text>
    <text x="1138" y="722" fill="#5d676d" font-family="Georgia, serif" font-size="16">12 chapters • 3 runs</text>

    <rect x="784" y="756" width="524" height="48" rx="24" fill="#ffffff" stroke="#d9cfc0"/>
    <text x="808" y="784" fill="#182126" font-family="Georgia, serif" font-size="18" font-weight="700">Salt Below The Stairs</text>
    <text x="1125" y="784" fill="#5d676d" font-family="Georgia, serif" font-size="16">9 chapters • 1 run</text>
  </g>
</svg>
