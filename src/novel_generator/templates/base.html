<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Novel Generator{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='style.css') }}">
</head>
<body>
  <header class="shell-header">
    <div>
      <a class="brand" href="/">Novel Generator</a>
      <p class="brand-copy">Self-hosted long-form fiction generation for Ollama.</p>
    </div>
    <nav class="shell-nav">
      <a href="/">Dashboard</a>
    </nav>
  </header>
  <main class="shell-main">
    {% if message %}
      <div class="notice">{{ message }}</div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
</body>
</html>
